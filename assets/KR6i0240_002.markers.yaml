  - {type: variant, offset: 4708, length: 403, content: '佛說慧印百六十三定解

      當知舍利弗！如來之身為無身、無作、無起、無滅、無從有、未曾造、無合、無遊、無至、無知、無習、都清淨、無畜、無憎、無行、無止、無生、無報、無見、無間、無臭、無甞、無更、無識、無曉、無喻、無知忍、無志、無思。非意、離意、意平無平、去意。無所與、無五道五道斷要具、無閨、無惱、無有、無畏、無可無不可、無業、無成、無言、無耎不現。非明非冥、非滅不滅、離滅已滅、為淨極淨。彼淨不用、非悅非愛、非負離負已住應於無處、非逝非亡非沒、非法非無法、非土非無土、非盡無有盡捨盡、無怒、離於天、離於嚮、離於說、離於思。非合非不合、非極非不極、非去非不去、非二非不樂。無彼受、無所視、無相、離相、不求相，明、安徐、無著、離著造信。亦無二稱，如為審如審，如義不負人，度無度，除無除，救無救，說無說，二無有等，無比等、與空等、無處等、無生等、無得等。無休息離息、已寂而寂、滿寂、散解、心善行轉至要，一切報斷，成具甚真身，明質淨。無自惟、無所行，行解無解無應，不齊、不長、不圓、不方、不讚陰、不稱種、不譽入、不是數、不致數、不復生、不可見、不有知、亦不死。不世因無不因，身然不趺無有居處，非終、非始、非念、非憂、非事、非諍、非惡相、非滅度、非滅訖、非所造、非不遊。', 宋: '', 元: '', 明: '', 宮: ''}
